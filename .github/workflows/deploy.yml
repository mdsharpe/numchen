name: Deploy

on:
  workflow_dispatch:
  workflow_run:
    workflows: [Build]
    types: [completed]
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  api:
    name: Deploy API
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Publish API
        run: dotnet publish src/Api -c Release -o publish

      - name: Zip publish output
        run: cd publish && zip -r ../api.zip .

      - uses: azure/login@v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Get Static Web App origins
        id: swa
        run: |
          DEFAULT=$(az staticwebapp show \
            --name ${{ vars.AZURE_STATIC_WEB_APP_NAME }} \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --query "defaultHostname" -o tsv)
          CUSTOMS=$(az staticwebapp show \
            --name ${{ vars.AZURE_STATIC_WEB_APP_NAME }} \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --query "customDomains[]" -o tsv)
          ORIGINS="https://$DEFAULT"
          for DOMAIN in $CUSTOMS; do
            ORIGINS="$ORIGINS;https://$DOMAIN"
          done
          echo "origins=$ORIGINS" >> "$GITHUB_OUTPUT"

      - name: Set AllowedOrigins app setting
        run: |
          az webapp config appsettings set \
            --name ${{ vars.AZURE_WEB_APP_NAME }} \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --settings "AllowedOrigins=${{ steps.swa.outputs.origins }}"

      - uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEB_APP_NAME }}
          package: api.zip

  ui:
    name: Deploy UI
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/ui
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: src/ui/package-lock.json

      - run: npm ci

      - run: npm run build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}

      - uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: upload
          skip_app_build: true
          app_location: src/ui/dist
