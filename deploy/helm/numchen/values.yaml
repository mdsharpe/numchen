# Public origin the UI is served from. Used for API CORS.
# Set to empty string to disable CORS (same-origin deployments don't need it).
publicOrigin: "https://numchen.mdsharpe.com"

api:
  image:
    repository: ghcr.io/mdsharpe/numchen-api
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  service:
    port: 8080
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 512Mi

ui:
  image:
    repository: ghcr.io/mdsharpe/numchen-ui
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  service:
    port: 80
    targetPort: 8080
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      memory: 128Mi

imagePullSecrets: []
